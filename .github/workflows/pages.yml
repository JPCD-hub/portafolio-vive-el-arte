name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          mkdir -p "$RUNNER_TEMP/site"
          rsync -a ./ "$RUNNER_TEMP/site/" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='Anagrama' \
            --exclude='Duvan Lasso' \
            --exclude='Foto live podcast' \
            --exclude='Lumbre Ancestral' \
            --exclude='Mao Escruceria' \
            --exclude='Natalia Rojas' \
            --exclude='Patrocinadores' \
            --exclude='Tatiana Agudelo' \
            --exclude='The Sick' \
            --exclude='Vigoro'
          touch "$RUNNER_TEMP/site/.nojekyll"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
