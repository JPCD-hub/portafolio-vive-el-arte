name: Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p "$RUNNER_TEMP/site"
          rsync -a ./ "$RUNNER_TEMP/site/" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='Anagrama' \
            --exclude='Duvan Lasso' \
            --exclude='Foto live podcast' \
            --exclude='Lumbre Ancestral' \
            --exclude='Mao Escruceria' \
            --exclude='Natalia Rojas' \
            --exclude='Patrocinadores' \
            --exclude='Tatiana Agudelo' \
            --exclude='The Sick' \
            --exclude='Vigoro'
          touch "$RUNNER_TEMP/site/.nojekyll"

      - name: Publish to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-deploy
          git rm -rf . || true
          cp -a "$RUNNER_TEMP/site/." .
          git add -A
          git commit -m "Deploy GitHub Pages"
          git push origin HEAD:gh-pages --force
